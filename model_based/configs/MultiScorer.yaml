input_path: ../data_process/example_input.jsonl
output_path: results/MultiScorer/
num_gpu: 4
num_gpu_per_job: 1
scorers:
- name: AtheneScorer
  model: Nexusflow/Athene-RM-8B
  batch_size: 8
  max_length: 4096
  num_gpu_per_job: 1
- name: DeitaQScorer
  model: hkust-nlp/deita-quality-scorer
  max_length: 2048
  batch_size: 8
  num_gpu_per_job: 1
- name: ReasoningScorer
  model: opendatalab/meta-rater-reasoning-rating
  batch_size: 16
  max_model_len: 2048
  num_gpu_per_job: 1
- name: Task2VecScorer
  model: openai-community/gpt2
  max_length: 512
  num_gpu_per_job: 1
  last_layer_only: true
