input_path: ../data_process/example_input.jsonl
output_path: results/MultiScorer/
num_gpu: 0
num_gpu_per_job: 0
scorers:
- name: ApjsScorer
  tokenization_method: gram
  n: 1
  similarity_method: direct
  max_workers: 128
  sample_pairs: 1000
- name: TokenLengthScorer
  encoder: o200k_base
  fields:
  - instruction
  - input
  - output
  max_workers: 128
- name: VendiScorer
  embedding_path: ../data_process/mock_embedding_128x512.npy
  similarity_metric: euclidean
  max_workers: 128
- name: HddScorer
  sample_size: 42.0
  max_workers: 128
